    type: "spa"
    description: "SPA: Fail with unsupported 'plain' PKCE method"
    client_id: "another-app"
    redirect_uri: "http://sample.another.example.com:9090/callback"
    username: "suzuki"
    password: "password"
    pkce_method: "plain"
