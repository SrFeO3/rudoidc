config:
  base_url: "http://localhost:8082"
  issuer: "https://auth.sr.example.com:8000"
  # SSL/TLS Options
  verify_ssl: false          # Set to false to ignore server certificate errors
  host_header: null         # Set a string (e.g., "auth.sr.example.com") to override the Host header
                            # This is useful when testing against an IP address (e.g., https://127.0.0.1) but needing a specific Host.

test_cases:
  - id: "discovery_endpoint"
    type: "discovery"
    description: "Verify OIDC discovery endpoint configuration"

  - id: "jwks_endpoint"
    type: "jwks"
    description: "Verify JWKS endpoint returns Ed25519 keys"

  - id: "token_alg_eddsa"
    type: "token_header"
    description: "Verify issued token header has alg: EdDSA"

  # ==========================================
  # SPA (Public Client) Test Cases
  # ==========================================

  # --- Success Cases ---
  - id: "spa_01_basic"
    type: "spa"
    description: "SPA: Basic Success Path"
    client_id: "another-app"
    redirect_uri: "http://sample.another.example.com:9090/callback"
    username: "suzuki"
    password: "password"
    scope: "openid profile"

  - id: "spa_02_scope_openid"
    type: "spa"
    description: "SPA: Success with minimal scope"
    client_id: "another-app"
    redirect_uri: "http://sample.another.example.com:9090/callback"
    username: "suzuki"
    password: "password"
    scope: "openid"

  - id: "spa_03_scope_profile"
    type: "spa"
    description: "SPA: Success with profile scope"
